  <polyline points="1460,460 1360,460 1360,420" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>

  <line x1="700" y1="0" x2="900" y2="500" stroke="#2563eb" stroke-width="0.6" opacity="0.12"/>
