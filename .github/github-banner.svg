    <line x1="37" y1="-37" x2="31" y2="-31" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/>
    <line x1="-37" y1="-37" x2="-31" y2="-31" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/>
