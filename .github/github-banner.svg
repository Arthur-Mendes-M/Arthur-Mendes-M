  <line x1="1100" y1="120" x2="1140" y2="120" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>
  <line x1="1140" y1="120" x2="1140" y2="150" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>

  <text x="150" y="218" font-family="'Courier New', Courier, monospace" font-size="15" fill="#2563eb" opacity="0.7" letter-spacing="3">const dev =</text>
  <text x="148" y="295" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="700" fill="url(#textGrad)" letter-spacing="-1" filter="url(#glow)">Arthur Martins</text>
  <text x="152" y="340" font-family="'Courier New', Courier, monospace" font-size="17" fill="#06b6d4" letter-spacing="4" opacity="0.9">FULL STACK DEVELOPER</text>
  <line x1="150" y1="358" x2="560" y2="358" stroke="#2563eb" stroke-width="1" opacity="0.4"/>
  <text x="152" y="382" font-family="'Courier New', Courier, monospace" font-size="12" fill="#64748b" letter-spacing="2">problem solver  ·  creative  ·  communicative  ·  security-aware</text>

