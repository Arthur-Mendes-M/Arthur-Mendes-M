    <circle cx="0" cy="0" r="28" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-52" x2="0" y2="-44" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <line x1="52" y1="0" x2="44" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="52" x2="0" y2="44" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
